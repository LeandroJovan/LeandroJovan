<svg width="1200" height="240" viewBox="0 0 1200 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020818"/>
      <stop offset="45%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#050d1f"/>
    </linearGradient>

    <!-- Cyan glow gradient for name -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0f7ff"/>
      <stop offset="40%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#90e0ef"/>
    </linearGradient>

    <!-- Blue orb gradient -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a6fc4;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#0d47a1;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#020818;stop-opacity:0"/>
    </radialGradient>

    <!-- Secondary orb -->
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#020818;stop-opacity:0"/>
    </radialGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.15" stroke-opacity="0.04"/>
    </pattern>

    <!-- Glow filter for text -->
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for subtitle -->
    <filter id="subtleGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path -->
    <clipPath id="roundedRect">
      <rect width="1200" height="240" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="240" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="240" fill="url(#grid)"/>

  <!-- Background orbs -->
  <ellipse cx="260" cy="120" rx="260" ry="200" fill="url(#orb1)"/>
  <ellipse cx="950" cy="80" rx="180" ry="160" fill="url(#orb2)"/>
  <ellipse cx="700" cy="200" rx="200" ry="120" fill="url(#orb1)" opacity="0.3"/>

  <!-- Decorative lines -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#00b4d8" stroke-width="1.5" opacity="0.6"/>
  <line x1="0" y1="239" x2="1200" y2="239" stroke="#00b4d8" stroke-width="1.5" opacity="0.6"/>

  <!-- Accent dots left -->
  <circle cx="32" cy="32" r="2.5" fill="#00b4d8" opacity="0.7"/>
  <circle cx="50" cy="32" r="1.5" fill="#00b4d8" opacity="0.4"/>
  <circle cx="32" cy="208" r="2.5" fill="#00b4d8" opacity="0.7"/>
  <circle cx="50" cy="208" r="1.5" fill="#00b4d8" opacity="0.4"/>

  <!-- Accent dots right -->
  <circle cx="1168" cy="32" r="2.5" fill="#00b4d8" opacity="0.7"/>
  <circle cx="1150" cy="32" r="1.5" fill="#00b4d8" opacity="0.4"/>
  <circle cx="1168" cy="208" r="2.5" fill="#00b4d8" opacity="0.7"/>
  <circle cx="1150" cy="208" r="1.5" fill="#00b4d8" opacity="0.4"/>

  <!-- Vertical accent lines -->
  <rect x="0" y="0" width="3" height="240" fill="url(#orb2)" opacity="0.8"/>
  <rect x="1197" y="0" width="3" height="240" fill="url(#orb2)" opacity="0.8"/>

  <!-- Google Fonts import via foreignObject trick - embed font face -->
  <!-- Main Name Text -->
  <text
    x="600"
    y="128"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="82"
    font-weight="800"
    letter-spacing="-1"
    fill="url(#nameGrad)"
    filter="url(#glow)"
  >Leandro Jovan</text>

  <!-- Thin divider line under name -->
  <rect x="440" y="158" width="320" height="1" fill="#00b4d8" opacity="0.5" rx="1"/>

  <!-- Subtitle with lightning bolts -->
  <text
    x="600"
    y="193"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="18"
    font-weight="500"
    letter-spacing="3"
    fill="#90caf9"
    filter="url(#subtleGlow)"
  >⚡  APPLIED DATA SCIENCE @ EEPIS SURABAYA  ⚡</text>
</svg>
